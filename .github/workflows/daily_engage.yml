name: 腰껅뙭 AutoBlog Daily Engage

on:
  schedule:
    - cron: '0 11 * * *'  # 11AM UTC = 4:30PM IST
  workflow_dispatch:

jobs:
  engage:
    runs-on: ubuntu-latest

    steps:
      - name: 腰껅몴 Checkout
        uses: actions/checkout@v4

      - name: 腰껅굲 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 腰껅몵 Install dependencies
        run: pip install -r requirements.txt

      - name: 腰껅뙭 Run Engagement Bot
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          DEVTO_API_KEY:    ${{ secrets.DEVTO_API_KEY }}
          HASHNODE_API_KEY: ${{ secrets.HASHNODE_API_KEY }}
        run: python engagement_bot.py

      - name: 腰껅뜎 Save engagement data
        run: |
          git config --global user.name "AutoBlog Engage"
          git config --global user.email "autoblog@bot.com"
          git add engagement.json brain.json || true
          git diff --staged --quiet || git commit -m "腰껅뙭 Engagement update $(date +'%Y-%m-%d')"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
