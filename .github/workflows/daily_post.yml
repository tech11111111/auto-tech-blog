name: ждЃтИЌ AutoBlog Daily Learn

on:
  schedule:
    - cron: '0 18 * * *'  # Every day at 6:00 PM UTC
  workflow_dispatch:        # Manual trigger

jobs:
  learn-and-evolve:
    runs-on: ubuntu-latest

    steps:
      - name: ждЃТЉю Checkout repository
        uses: actions/checkout@v4

      - name: ждЃТѓЋ Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ждЃТЉЮ Install dependencies
        run: pip install -r requirements.txt

      - name: ждЃтИЌ Run Daily Learner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEVTO_API_KEY:  ${{ secrets.DEVTO_API_KEY }}
        run: python learner.py

      - name: ждЃТЇЉ Save updated brain.json to repo
        run: |
          git config --global user.name "AutoBlog Brain"
          git config --global user.email "autoblog@bot.com"
          git add brain.json memory.json || true
          git diff --staged --quiet || git commit -m "ждЃЬЮЦ Brain evolved - $(date +'%Y-%m-%d')"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
