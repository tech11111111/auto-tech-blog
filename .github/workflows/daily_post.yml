name: ждЃЬў╗ AutoBlog Daily Post

on:
  schedule:
    - cron: '0 9 * * *'   # Every day at 9:00 AM UTC (2:30 PM IST)
  workflow_dispatch:        # Manual trigger

jobs:
  post-blog:
    runs-on: ubuntu-latest

    steps:
      - name: ждЃТЉю Checkout repository
        uses: actions/checkout@v4

      - name: ждЃТѓЋ Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ждЃТЉЮ Install dependencies
        run: pip install -r requirements.txt

      - name: ждЃТћ│ Run Keyword Research First
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEVTO_API_KEY:  ${{ secrets.DEVTO_API_KEY }}
        run: python keyword_researcher.py

      - name: ждЃТ«ї Run AutoBlog Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEVTO_API_KEY:  ${{ secrets.DEVTO_API_KEY }}
        run: python main.py

      - name: ждЃТЇЉ Save files back to repo
        run: |
          git config --global user.name "AutoBlog Bot"
          git config --global user.email "autoblog@bot.com"
          git add memory.json brain.json || true
          git diff --staged --quiet || git commit -m "ждЃТЉЉ New post + keywords $(date +'%Y-%m-%d')"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
