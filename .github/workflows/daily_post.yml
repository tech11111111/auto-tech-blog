name: 🤖 AutoBlog Daily Post

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  post-blog:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Run AutoBlog Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEVTO_API_KEY:  ${{ secrets.DEVTO_API_KEY }}
        run: python main.py

      - name: 💾 Save files back to repo
        run: |
          git config --global user.name "AutoBlog Bot"
          git config --global user.email "autoblog@bot.com"
          git add memory.json brain.json || true
          git diff --staged --quiet || git commit -m "📝 New post $(date +'%Y-%m-%d')"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
