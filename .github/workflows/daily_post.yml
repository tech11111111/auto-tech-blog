name: ждЃЬў╗ AutoBlog Daily Post

on:
  schedule:
    - cron: '0 8 * * *'   # 8AM UTC = scan
    - cron: '30 8 * * *'  # 8:30AM UTC = viral detect
    - cron: '0 9 * * *'   # 9AM UTC = post (2:30PM IST)
  workflow_dispatch:

jobs:
  scan-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: ждЃТЉю Checkout
        uses: actions/checkout@v4

      - name: ждЃТѓЋ Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ждЃТЉЮ Install dependencies
        run: pip install -r requirements.txt

      - name: ждЃт»д Run Industry Scanner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEVTO_API_KEY:  ${{ secrets.DEVTO_API_KEY }}
        run: python industry_scanner.py

      - name: ждЃТЋЪ Run Viral Detector
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEVTO_API_KEY:  ${{ secrets.DEVTO_API_KEY }}
        run: python viral_detector.py

      - name: ждЃТћи Run SEO Optimizer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEVTO_API_KEY:  ${{ secrets.DEVTO_API_KEY }}
        run: python seo_optimizer.py

      - name: ждЃТћ│ Run Keyword Research
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEVTO_API_KEY:  ${{ secrets.DEVTO_API_KEY }}
        run: python keyword_researcher.py

      - name: ждЃТ«ї Run AutoBlog
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEVTO_API_KEY:  ${{ secrets.DEVTO_API_KEY }}
        run: python main.py

      - name: ждЃТЇЉ Save files
        run: |
          git config --global user.name "AutoBlog Bot"
          git config --global user.email "autoblog@bot.com"
          git add memory.json brain.json || true
          git diff --staged --quiet || git commit -m "ждЃТЉЉ Post + brain update $(date +'%Y-%m-%d')"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
